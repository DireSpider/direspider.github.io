<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>{{ page.title }} | My Video Site</title>
    
    <link rel="stylesheet" href="{{ '/css/style.css' | relative_url }}">
    
    <style>
        /* Quick layout styling if you haven't made a CSS file yet */
        body { font-family: sans-serif; line-height: 1.6; margin: 0; color: #333; }
        header { background: #222; color: #fff; padding: 1rem 0; text-align: center; }
        nav { background: #444; padding: 0.5rem; text-align: center; }
        nav a { color: white; margin: 0 15px; text-decoration: none; font-weight: bold; }
        nav a:hover { text-decoration: underline; }
        main { max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
        footer { text-align: center; padding: 2rem; font-size: 0.8rem; color: #777; border-top: 1px solid #eee; }
        
        /* Style for your video divs (from videos.html) */
        .video-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .video-card { border: 1px solid #ddd; padding: 15px; border-radius: 8px; background: #f9f9f9; }
    </style>
</head>
<body>

    <header>
        <h1>My Video Collection</h1>
    </header>

    <nav>
        <a href="{{ '/' | relative_url }}">Home</a>
        <a href="{{ '/page1' | relative_url }}">All Videos</a>
        <a href="{{ '/page2' | relative_url }}">About</a>
    </nav>

    <main>
        {{ content }}
    </main>

    <footer>
        <p>&copy; {{ "now" | date: "%Y" }} Built with Jekyll on GitHub Pages</p>
    </footer>

</body>
</html>
